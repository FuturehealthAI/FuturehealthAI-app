<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sifferverket</title>

  <!-- Hämta Cormorant Garamond från Google Fonts (regular + italic, flera vikter) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap" rel="stylesheet">

  <style>
    /* Globala variabler så att färger och linjer kan ändras på ett ställe */
    :root {
      --bg: #e8e6dd;                              /* off-white bakgrund */
      --ink: #0a2a30;                             /* mörkblågrön text */
      --ink-faded: rgba(10, 42, 48, 0.32);        /* gråtonad version för ej raffinerade siffror */
      --hairline: rgba(10, 42, 48, 0.20);         /* tunn linje för rutnätet */
    }

    /* Återställ standardmarginaler och låt padding räknas in i bredden */
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;                          /* fyll hela fönstret vertikalt */
      background: var(--bg);
      color: var(--ink);
      font-family: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
      padding: 3.5rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;                        /* centrera innehållet horisontellt */
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3rem);          /* skalar mellan mobil och desktop */
      font-weight: 500;
      letter-spacing: 0.01em;
      margin: 0 0 0.4rem 0;
    }

    .employee {
      font-style: italic;
      font-size: 1.05rem;
      opacity: 0.75;
      letter-spacing: 0.04em;
    }

    /* Rutnätet: tre kolumner, tre rader, kvadratisk yta */
    .grid {
      width: min(560px, 100%);
      aspect-ratio: 1 / 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      /* Endast topp- och vänsterlinje här – cellerna ger resten, så vi slipper dubbla linjer */
      border-top: 1px solid var(--hairline);
      border-left: 1px solid var(--hairline);
    }

    .cell {
      /* Cellerna bidrar med höger- och bottenlinje, vilket ger ett rent enkelramat rutnät */
      border-right: 1px solid var(--hairline);
      border-bottom: 1px solid var(--hairline);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0.5rem;
      text-align: center;
    }

    /* Heltalet i stort italic Cormorant */
    .value {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-weight: 500;
      font-size: clamp(2.4rem, 7vw, 3.6rem);
      line-height: 1;
    }

    /* Gråtonad cell när kansla saknas */
    .cell.faded { color: var(--ink-faded); }

    /* Etiketten "ej raffinerad" – små versaler, lite glesare bokstäver */
    .label {
      margin-top: 0.55rem;
      font-size: 0.72rem;
      font-variant-caps: all-small-caps;          /* riktiga små versaler */
      letter-spacing: 0.18em;
      opacity: 0.85;
    }

    /* Pricken (·) i tomma celler */
    .empty {
      font-size: 2rem;
      color: var(--ink-faded);
      line-height: 1;
    }

    /* Sigillet i mittencellen: bokstaven S inuti en cirkel */
    .sigil {
      width: 64%;
      aspect-ratio: 1 / 1;
      border: 1px solid var(--ink);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-style: italic;
      font-weight: 500;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
    }
  </style>
</head>
<body>

  <!-- Sidans rubrik och anställd-rad -->
  <header>
    <h1>Välkommen till Sifferverket</h1>
    <div class="employee">Anställd: Claude</div>
  </header>

  <!-- Här ritas 3x3-matrisen ut av JavaScript -->
  <div class="grid" id="grid" aria-label="Sifferverkets matris"></div>

  <!-- Supabase JS v2 från CDN. Skriptet exponerar ett globalt objekt som heter "supabase". -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // === Konfiguration: byt ut platshållarna mot dina egna värden ===
    const SUPABASE_URL = 'https://pjiouigepiacxpptgoqr.supabase.co'; // bas-URL till din Supabase-instans (utan /rest/v1/)
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBqaW91aWdlcGlhY3hwcHRnb3FyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NDAwNTksImV4cCI6MjA5MzUxNjA1OX0.M7qwGGDuksKZVY6fVAbClgvgJ8txGn_hC78qgyTJ_2Q'; // publik anon-nyckel

    // Skapa en Supabase-klient. CDN-skriptet ovan har lagt "supabase" som globalt objekt.
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Hämta en referens till tomma <div id="grid"> i HTML:en
    const grid = document.getElementById('grid');

    // Renderar 9 celler – position 4 (mitten) är alltid sigillet, övriga får siffror.
    function render(numbers) {
      grid.innerHTML = '';                        // töm rutnätet inför ny rendering

      // Plocka ut de 8 senaste raderna (resten ignoreras enligt specen)
      const senaste = numbers.slice(0, 8);

      let dataIndex = 0;                          // räknare som vandrar genom de 8 datasloten

      // Loopa genom alla 9 cellpositioner i rutnätet
      for (let i = 0; i < 9; i++) {
        const cell = document.createElement('div'); // skapa själva cell-elementet
        cell.className = 'cell';

        if (i === 4) {
          // Mittencellen: rita sigillet (bokstaven S i en cirkel)
          const sigil = document.createElement('div');
          sigil.className = 'sigil';
          sigil.textContent = 'S';
          cell.appendChild(sigil);
        } else {
          // Hämta nästa siffra ur listan – kan vara undefined om vi har färre än 8
          const row = senaste[dataIndex];
          dataIndex++;                            // gå vidare till nästa datapost

          if (!row) {
            // Ingen siffra för denna ruta → visa en liten prick i mitten
            const dot = document.createElement('div');
            dot.className = 'empty';
            dot.textContent = '·';                // mittpunkt (U+00B7)
            cell.appendChild(dot);
          } else {
            // Räkna kansla som ifyllt endast om det finns OCH inte är en tom sträng
            const raffinerad = row.kansla !== null && row.kansla !== undefined && String(row.kansla).trim() !== '';

            // Markera cellen som gråtonad när kansla saknas
            if (!raffinerad) cell.classList.add('faded');

            // Skapa själva siffran
            const value = document.createElement('div');
            value.className = 'value';
            value.textContent = row.varde;        // heltalsvärdet från databasen
            cell.appendChild(value);

            // Lägg endast till etiketten "ej raffinerad" när kansla är tom
            if (!raffinerad) {
              const label = document.createElement('div');
              label.className = 'label';
              label.textContent = 'ej raffinerad';
              cell.appendChild(label);
            }
          }
        }

        grid.appendChild(cell);                   // foga in den färdiga cellen i rutnätet
      }
    }

    // Hämtar alla rader ur "siffror" och triggar rendering
    async function load() {
      // SELECT med sortering: created_at fallande → senaste först
      const { data, error } = await client
        .from('siffror')                          // tabellen vi läser från
        .select('id, varde, kansla, created_at')  // kolumnerna vi behöver
        .order('created_at', { ascending: false }); // senaste raderna överst

      if (error) {
        // Plocka ut de meningsfulla fälten ur Supabase-felet (annars blir det "[object Object]")
        console.error('Kunde inte hämta siffror.');
        console.error('message:', error.message);   // den läsbara orsaken
        console.error('code:   ', error.code);      // PostgREST/Postgres felkod, t.ex. PGRST116, 42P01
        console.error('details:', error.details);   // teknisk detaljbeskrivning
        console.error('hint:   ', error.hint);      // ledtråd från Postgres om hur man fixar det

        // Visa felet direkt på sidan så det inte göms i konsolen
        const banner = document.createElement('div');
        banner.style.cssText = 'max-width:560px;margin:0 auto 1.5rem;padding:0.75rem 1rem;border:1px solid #b04a3c;color:#b04a3c;font-style:italic;text-align:center;';
        banner.textContent = 'Fel från databasen: ' + (error.message || 'okänt fel') + (error.hint ? ' — ' + error.hint : '');
        grid.parentNode.insertBefore(banner, grid);

        render([]);                                 // rita ändå ut tomt rutnät så sigillet syns
        return;
      }

      render(data || []);                         // skicka vidare datan (eller tom lista) till renderaren
    }

    // Kör laddningen så fort skriptet körs
    load();
  </script>
</body>
</html>
